<div class="flex flex-col min-h-screen bg-[#0a0f1e] text-white">
  
  @if (!hideNavbarAndFooter) {
    <app-navbar class="sticky top-0 z-40 border-b border-white/5 bg-[#0a0f1e]/80 backdrop-blur-md"/>
  }

  <main [class.container]="hideNavbarAndFooter" [class.mx-auto]="hideNavbarAndFooter" class="flex-grow flex flex-col">
    <router-outlet></router-outlet>
  </main>

  @if (!hideNavbarAndFooter) {
    <app-footer class="border-t border-white/5 bg-[#0a0f1e]"/>
  }
</div>
